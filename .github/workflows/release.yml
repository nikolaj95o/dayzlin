name: Release

# Manual escape hatch: a human pushing a v* tag (with their own credentials)
# triggers a full publish. The normal path is release-pr.yml + release-publish.yml.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  release:
    needs: version
    uses: ./.github/workflows/release-build.yml
    with:
      publish: true
      version: ${{ needs.version.outputs.version }}
    secrets: inherit
