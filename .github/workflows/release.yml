name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run tauri build
      # Workspace target dir is at the repo root, not under src-tauri/.
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/dayzlin

  flatpak:
    runs-on: ubuntu-latest
    # Prebuilt image ships flatpak, flatpak-builder, ostree, git, gpg, and the
    # GNOME 47 Platform + Sdk — so those don't get installed/downloaded per run.
    # --privileged is needed for flatpak-builder's bubblewrap sandbox in a container.
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      # Restore the previously published repo so new builds add an incremental
      # commit instead of replacing history (clients then get small updates).
      - uses: actions/checkout@v5
        continue-on-error: true          # first-ever run: gh-pages doesn't exist yet
        with:
          ref: gh-pages
          path: site
      - run: mkdir -p site/repo

      - name: Import GPG signing key
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}
        run: |
          echo "$FLATPAK_GPG_PRIVATE_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/ {print $10; exit}')
          echo "FLATPAK_GPG_KEYID=$KEYID" >> "$GITHUB_ENV"

      # The user install holds only what we add below (+ ostree metadata), so it's
      # a self-contained cache. Bump the key suffix when these versions change.
      - name: Cache Flatpak SDK extensions
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-ext-gnome47-rust24.08-node24-24.08
          restore-keys: flatpak-ext-

      - name: Add Flathub remote + install SDK extensions
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub \
            org.freedesktop.Sdk.Extension.rust-stable//24.08 \
            org.freedesktop.Sdk.Extension.node24//24.08

      # Persist the in-sandbox cargo/npm build across releases so warm runs only
      # recompile changed crates instead of the whole ~500-crate workspace.
      - name: Cache cargo + npm (in-sandbox build)
        uses: actions/cache@v4
        with:
          path: /cargo-cache
          key: flatpak-cargo-${{ hashFiles('Cargo.lock', 'package-lock.json') }}
          restore-keys: flatpak-cargo-
      - run: mkdir -p /cargo-cache

      # Patch the manifest in place (CI only — never committed) to bind-mount the
      # cache dir into the build sandbox and point cargo/npm at it. /cargo-cache is
      # outside home, so flatpak doesn't remap the path; CARGO_TARGET_DIR there
      # survives --force-clean and gets saved by actions/cache above.
      - name: Patch manifest with CI build cache
        run: |
          curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq && chmod +x /usr/local/bin/yq
          yq -i '
            (.modules[] | select(.name=="dayzlin") | .build-options.build-args) += ["--filesystem=/cargo-cache"] |
            (.modules[] | select(.name=="dayzlin") | .build-options.env) =
              {"CARGO_HOME":"/cargo-cache/cargo","CARGO_TARGET_DIR":"/cargo-cache/target","npm_config_cache":"/cargo-cache/npm"}
          ' flatpak/io.github.nikolaj95o.dayzlin.yml

      - name: Build + sign into the OSTree repo
        run: |
          flatpak-builder --user --force-clean \
            --repo=site/repo --gpg-sign="$FLATPAK_GPG_KEYID" \
            build-dir flatpak/io.github.nikolaj95o.dayzlin.yml
          flatpak build-update-repo \
            --generate-static-deltas --prune \
            --gpg-sign="$FLATPAK_GPG_KEYID" site/repo

      - name: Generate .flatpakrepo descriptor
        run: |
          GPGKEY_B64=$(gpg --export "$FLATPAK_GPG_KEYID" | base64 -w0)
          cat > site/dayzlin.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=dayzlin
          Url=https://nikolaj95o.github.io/dayzlin/repo/
          Homepage=https://github.com/nikolaj95o/dayzlin
          Comment=DayZ launcher for Linux
          Description=Latest dayzlin builds
          GPGKey=$GPGKEY_B64
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
