# Flatpak manifest for dayzlin.
#
# Local test build (needs the runtime + SDK extensions installed first):
#   flatpak install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50 \
#     org.freedesktop.Sdk.Extension.rust-stable//25.08 \
#     org.freedesktop.Sdk.Extension.node24//25.08
#   flatpak run org.flatpak.Builder --force-clean --user --install \
#     build-dir flatpak/io.github.nikolaj95o.dayzlin.yml
#   flatpak run io.github.nikolaj95o.dayzlin
#
# NOTE: this manifest builds with network access (build-args: --share=network),
# which is fine for local/GitHub-release builds. A Flathub submission must instead
# vendor sources offline (flatpak-cargo-generator + flatpak-node-generator) and
# drop the --share=network.
id: io.github.nikolaj95o.dayzlin
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: dayzlin
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # No host-spawn / --talk-name=org.freedesktop.Flatpak: launching the game, workshop downloads,
  # opening the workshop page and the mod folder all leave as steam://…/file:// URIs handed to the
  # OpenURI portal (via the runtime's own xdg-open), so Steam handles them on the host without us
  # holding an arbitrary-spawn permission.
  #
  # Native Steam's own locations, read/write. Covers Steam's config (libraryfolders.vdf), the
  # steam.pipe "is Steam running?" probe used before editing Steam-owned files, and the
  # game/workshop dirs of a default-location library. These are the user's own dot-dirs, so
  # Flathub doesn't flag them. Write access is required — installing/linking/removing mods writes
  # into the library (symlinks, workshop content, appworkshop_*.acf).
  #
  # Anything not covered here — a library on another mount (e.g. /mnt/FAST/SteamLibrary), or a
  # *Flatpak* Steam install (~/.var/app/com.valvesoftware.Steam, which Flathub forbids granting
  # statically) — is granted dynamically at runtime when the user points the app at it via the file
  # chooser (document portal, rw to just that subtree). So we need no broad `host` access.
  - --filesystem=~/.steam:rw
  - --filesystem=~/.local/share/Steam:rw
modules:
  - name: dayzlin
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin
      build-args:
        - --share=network
    build-commands:
      # Build via the Tauri CLI so the app is compiled in *production* mode and embeds the
      # frontend. A bare `cargo build` leaves Tauri in dev mode, where the webview loads the
      # Vite dev server (http://localhost:5173) — which isn't running in the sandbox, so the
      # window just shows "Could not connect to localhost: Connection refused". `tauri build`
      # runs the frontend build (beforeBuildCommand) itself; `--no-bundle` skips the
      # AppImage/deb/rpm bundlers (we only need the raw binary for the Flatpak).
      - npm ci
      - npm run tauri build -- --no-bundle
      - install -Dm755 "${CARGO_TARGET_DIR:-target}/release/dayzlin" /app/bin/dayzlin
      # Desktop integration + AppStream metainfo. flatpak-builder runs appstream-compose over
      # /app/share/metainfo at the end of the build, which is what makes `flatpak list --app`
      # report a version (from the metainfo <releases>).
      - install -Dm644 flatpak/io.github.nikolaj95o.dayzlin.desktop /app/share/applications/io.github.nikolaj95o.dayzlin.desktop
      - install -Dm644 flatpak/io.github.nikolaj95o.dayzlin.metainfo.xml /app/share/metainfo/io.github.nikolaj95o.dayzlin.metainfo.xml
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.nikolaj95o.dayzlin.png
    sources:
      - type: dir
        path: ..
        skip:
          - .git
          - target
          - node_modules
          - dist
          - build-dir
          - .flatpak-builder
